<!DOCTYPE html>
<html>
<head>
    <title>MovieBox Login</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: url("https://images.unsplash.com/photo-1534447677768-be436bb09401") no-repeat center center/cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            background: rgba(0, 0, 0, 0.85);
            padding: 40px;
            border-radius: 15px;
            width: 350px;
            text-align: center;
            color: white;
        }

        h1 {
            color: #00d4ff;
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 25px;
            border: none;
            outline: none;
            background: #111;
            color: white;
        }

        .btn {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
        }

        .login-btn {
            background: #00d4ff;
            color: black;
        }

        .signup-btn {
            background: transparent;
            border: 1px solid white;
            color: white;
        }

        .options {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-top: 10px;
        }

        a {
            color: #00d4ff;
            text-decoration: none;
        }

    </style>
</head>

<body>

<div class="login-box">

    <h1>MOVIEFLIX</h1>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button class="btn login-btn" onclick="login()">SIGN IN</button>

    <button class="btn signup-btn" onclick="goRegister()">SIGN UP</button>

</div>

<script>
function login() {
    fetch("http://localhost:8080/auth/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            email: document.getElementById("email").value,
            password: document.getElementById("password").value
        })
    })
    .then(res => res.json())
    .then(data => {
        if(data.msg === "Login successful"){
            window.location.href = "http://127.0.0.1:5000/home";
        } else {
            alert(data.msg);
        }
    });
}

function goRegister() {
   window.location.href = "/register";
}
</script>



</body>
</html>
